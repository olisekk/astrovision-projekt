<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AstroVision{% endblock %} – Katalog astronomických objektů</title>
    {% load static %}
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --bg3: #1a2035;
            --card: #141c2e;
            --border: #1e2d4a;
            --accent: #4f9cf9;
            --accent2: #7c3aed;
            --gold: #f59e0b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --green: #10b981;
            --red: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            padding: 0 2rem;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center;
            height: 64px; gap: 2rem;
        }
        .nav-brand {
            font-size: 1.3rem; font-weight: 700;
            color: var(--accent); text-decoration: none;
            display: flex; align-items: center; gap: .5rem;
        }
        .nav-links { display: flex; gap: .25rem; list-style: none; margin-left: auto; }
        .nav-links a {
            color: var(--text-muted); text-decoration: none;
            padding: .5rem 1rem; border-radius: 8px;
            transition: all .2s; font-size: .9rem; font-weight: 500;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text); background: var(--bg3);
        }

        /* ===== MAIN ===== */
        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, #0f1729 0%, #1a0a2e 50%, #0a1a2e 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4rem 3rem;
            text-align: center;
            position: relative; overflow: hidden;
            margin-bottom: 3rem;
        }
        .hero::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(79,156,249,.15) 0%, transparent 60%);
        }
        .hero h1 { font-size: 2.8rem; font-weight: 800; position: relative;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-muted); font-size: 1.15rem; margin-top: .75rem; position: relative; }
        .stars-bg {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
              radial-gradient(1px 1px at 10% 20%, white, transparent),
              radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.6), transparent),
              radial-gradient(1px 1px at 70% 10%, white, transparent),
              radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,.7), transparent),
              radial-gradient(1px 1px at 50% 80%, rgba(255,255,255,.5), transparent),
              radial-gradient(1px 1px at 20% 90%, white, transparent),
              radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,.8), transparent),
              radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,.6), transparent);
        }

        /* ===== CARDS ===== */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: transform .2s, box-shadow .2s; text-decoration: none; color: inherit;
            display: flex; flex-direction: column;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(79,156,249,.15);
            border-color: var(--accent);
        }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-img-placeholder {
            width: 100%; height: 180px;
            background: linear-gradient(135deg, #0f1729, #1a2035);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem;
        }
        .card-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; gap: .5rem; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .card-sub { font-size: .85rem; color: var(--text-muted); }
        .card-footer { padding: .75rem 1.25rem; border-top: 1px solid var(--border);
            display: flex; gap: .5rem; flex-wrap: wrap; }

        /* ===== BADGES ===== */
        .badge {
            font-size: .75rem; font-weight: 600; padding: .25rem .65rem;
            border-radius: 20px; display: inline-flex; align-items: center; gap: .3rem;
        }
        .badge-blue { background: rgba(79,156,249,.15); color: var(--accent); border: 1px solid rgba(79,156,249,.3); }
        .badge-purple { background: rgba(124,58,237,.15); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); }
        .badge-gold { background: rgba(245,158,11,.15); color: var(--gold); border: 1px solid rgba(245,158,11,.3); }
        .badge-green { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }

        /* ===== STATS ROW ===== */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem; text-align: center; }
        .stat-num { font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: .85rem; color: var(--text-muted); margin-top: .25rem; }

        /* ===== SECTION HEADER ===== */
        .section-header { display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem; }
        .section-title { font-size: 1.4rem; font-weight: 700; }
        .section-title span { color: var(--accent); }
        .btn {
            padding: .55rem 1.2rem; border-radius: 8px; font-size: .9rem;
            font-weight: 600; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: .4rem; transition: all .2s;
            border: none;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #3b82f6; }
        .btn-outline { background: transparent; color: var(--accent);
            border: 1px solid var(--accent); }
        .btn-outline:hover { background: rgba(79,156,249,.1); }

        /* ===== FILTERS ===== */
        .filters {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.25rem;
            margin-bottom: 2rem;
            display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: .35rem; flex: 1; min-width: 160px; }
        .filter-group label { font-size: .8rem; color: var(--text-muted); font-weight: 600;
            text-transform: uppercase; letter-spacing: .05em; }
        .filter-group input, .filter-group select {
            background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); padding: .55rem .9rem; border-radius: 8px;
            font-size: .9rem; outline: none;
        }
        .filter-group input:focus, .filter-group select:focus { border-color: var(--accent); }

        /* ===== TABLE ===== */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: var(--bg3); color: var(--text-muted);
            font-size: .8rem; text-transform: uppercase; letter-spacing: .05em;
            padding: .75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
        tbody tr:hover { background: var(--bg3); }
        tbody td { padding: .9rem 1rem; font-size: .9rem; vertical-align: middle; }

        /* ===== DETAIL PAGE ===== */
        .detail-hero {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; margin-bottom: 2rem;
        }
        .detail-hero-img { width: 100%; max-height: 380px; object-fit: cover; }
        .detail-hero-placeholder {
            width: 100%; height: 280px;
            background: linear-gradient(135deg, #0f1729, #1a0a2e);
            display: flex; align-items: center; justify-content: center;
            font-size: 6rem;
        }
        .detail-hero-body { padding: 2rem; }
        .detail-hero-body h1 { font-size: 2rem; font-weight: 800; }
        .detail-meta { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 1rem; }
        .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
        .info-box { background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem; }
        .info-box h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem;
            text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
        .info-row { display: flex; justify-content: space-between; align-items: center;
            padding: .6rem 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; text-align: right; }

        /* ===== TIMELINE ===== */
        .timeline { display: flex; flex-direction: column; gap: 1rem; }
        .timeline-item {
            background: var(--bg3); border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0; padding: 1rem 1.25rem;
        }
        .timeline-date { font-size: .8rem; color: var(--accent); font-weight: 700; }
        .timeline-text { font-size: .9rem; color: var(--text-muted); margin-top: .3rem; }

        /* ===== BORTLE SCALE ===== */
        .bortle { display: flex; gap: .2rem; }
        .bortle-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--border);
        }
        .bortle-dot.active { background: var(--gold); }

        /* ===== STARS RATING ===== */
        .stars { color: var(--gold); font-size: 1rem; }

        /* ===== EMPTY STATE ===== */
        .empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty-icon { font-size: 3rem; margin-bottom: 1rem; }

        /* ===== BREADCRUMB ===== */
        .breadcrumb { display: flex; gap: .5rem; align-items: center;
            font-size: .85rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* ===== FOOTER ===== */
        footer { border-top: 1px solid var(--border); padding: 2rem;
            text-align: center; color: var(--text-muted); font-size: .85rem; margin-top: 4rem; }
        footer strong { color: var(--accent); }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <a href="{% url 'katalog:index' %}" class="nav-brand">🔭 AstroVision</a>
        <ul class="nav-links">
            <li><a href="{% url 'katalog:index' %}" class="{% if request.resolver_match.url_name == 'index' %}active{% endif %}">Úvod</a></li>
            <li><a href="{% url 'katalog:objekty_seznam' %}" class="{% if 'objekty' in request.resolver_match.url_name %}active{% endif %}">Objekty</a></li>
            <li><a href="{% url 'katalog:pozorovateny_seznam' %}" class="{% if 'pozorovatn' in request.resolver_match.url_name %}active{% endif %}">Pozorovatelny</a></li>
            <li><a href="/admin/" target="_blank">Admin</a></li>
        </ul>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <p><strong>AstroVision</strong> &mdash; Katalog astronomických objektů &copy; 2025</p>
</footer>
</body>
</html>
